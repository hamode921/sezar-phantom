<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEZAR PHANTOM - القائمة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .header { border: 2px double #fbbf24; padding: 15px; text-align: center; width: 100%; max-width: 400px; margin-bottom: 20px; }
        .coin-card { background: #080808; border: 1px solid #222; padding: 15px; width: 100%; max-width: 400px; margin-bottom: 10px; display: flex; justify-content: space-between; cursor: pointer; text-decoration: none; color: white; }
        .coin-card:hover { border-color: #00d2ff; }
    </style>
</head>
<body>
    <div class="header"><h2>🚀 VICTUS RADAR PRO - SEZAR</h2></div>
    <div id="list" style="width: 100%; display: flex; flex-direction: column; align-items: center;">جاري الفحص...</div>

    <script>
        const coins = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT', 'XAUUSDT'];
        async function load() {
            const r = await Promise.all(coins.map(c => fetch('https://api.binance.com/api/v3/ticker/price?symbol='+c).then(res=>res.json())));
            document.getElementById('list').innerHTML = r.map(i => `
                <a href="radar.html?symbol=${i.symbol}" class="coin-card">
                    <b>${i.symbol}</b>
                    <span style="color:#00d2ff;">$${parseFloat(i.price).toLocaleString()}</span>
                </a>`).join('');
        }
        setInterval(load, 5000); load();
    </script>
</body>
</html>
