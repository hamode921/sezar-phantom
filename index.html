<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Victus Radar</title>
<style>
body { background:black; color:#00eaff; text-align:center; font-family:Arial; }
.box { border:2px solid gold; padding:20px; margin:20px; font-size:24px; }
.coin {
    display:block;
    margin:20px;
    padding:20px;
    border:1px solid #00eaff;
    cursor:pointer;
    font-size:22px;
}
</style>
</head>

<body>

<div class="box">🚀 VICTUS RADAR - SELECT COIN</div>

<div class="coin" onclick="go('BTCUSDT')">BTC / Bitcoin</div>
<div class="coin" onclick="go('ETHUSDT')">ETH / Ethereum</div>
<div class="coin" onclick="go('SOLUSDT')">SOL / Solana</div>

<script>
function go(symbol){
    window.location.href = "radar.html?symbol=" + symbol;
}
</script>

</body>
</html>
