<script>
const MIN_WHALE_USDT = 1000000;

let lastPrice = 0;

async function scanMarket() {
    try {
        const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${SYMBOL}&limit=100`);
        const data = await res.json();

        let buyVolume = 0;
        let sellVolume = 0;

        let topBid = parseFloat(data.bids[0][0]);
        let topAsk = parseFloat(data.asks[0][0]);

        // حساب الفوليوم الحقيقي
        data.bids.forEach(b => {
            let vol = parseFloat(b[0]) * parseFloat(b[1]);
            if (vol > MIN_WHALE_USDT) buyVolume += vol;
        });

        data.asks.forEach(a => {
            let vol = parseFloat(a[0]) * parseFloat(a[1]);
            if (vol > MIN_WHALE_USDT) sellVolume += vol;
        });

        let signal = "WAIT ⏳";

        // 🔥 1. Imbalance
        let imbalance = buyVolume / (sellVolume + 1);

        // 🔥 2. Absorption
        let priceNow = (topBid + topAsk) / 2;

        let absorption = false;
        if (buyVolume > sellVolume && priceNow <= lastPrice) {
            absorption = true;
        }
        if (sellVolume > buyVolume && priceNow >= lastPrice) {
            absorption = true;
        }

        // 🔥 3. Fake Break
        let fakeBreak = false;
        if (Math.abs(priceNow - lastPrice) > 5 && absorption) {
            fakeBreak = true;
        }

        // 🎯 القرار النهائي
        if (fakeBreak) {
            signal = "💥 FAKE BREAK (STRONG ENTRY)";
        } 
        else if (absorption) {
            signal = "🧲 ABSORPTION (SMART MONEY)";
        }
        else if (imbalance > 2) {
            signal = "BUY 🚀 (IMBALANCE)";
        } 
        else if (imbalance < 0.5) {
            signal = "SELL 🔻 (IMBALANCE)";
        }

        document.getElementById("signal").innerText = signal;

        lastPrice = priceNow;

    } catch (e) {
        document.getElementById("signal").innerText = "ERROR...";
    }
}
</script>
