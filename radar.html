<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار سيزر الاحترافي</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .victus-box { width: 100%; max-width: 450px; border: 2px solid #333; padding: 20px; background: #000; }
        .price-dash { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 26px; font-weight: bold; margin: 15px 0; background: #080808; }
        .sig-box { padding: 20px; text-align: center; font-weight: bold; font-size: 18px; border-radius: 4px; border: 1px solid #444; }
        .data-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #111; font-size: 14px; }
    </style>
</head>
<body>
    <div class="victus-box">
        <h2 id="coin-name" style="color:#00d2ff; text-align:center;">BTC</h2>
        <div class="price-dash" id="price-val">$0.00</div>
        <div id="sig-val" class="sig-box">ANALYZING...</div>
        
        <div style="margin-top:20px;">
            <div class="data-row"><span>Whale Buy:</span><span id="b-vol" style="color:#22c55e;">$0M</span></div>
            <div class="data-row"><span>Whale Sell:</span><span id="s-vol" style="color:#ef4444;">$0M</span></div>
        </div>
        <button onclick="location.href='index.html'" style="width:100%; margin-top:20px; background:#111; color:#666; border:1px solid #333; padding:10px; cursor:pointer;">[ العودة للقائمة ]</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const SYMBOL = urlParams.get('symbol') || 'BTCUSDT';
        let lastPrice = 0;

        async function scan() {
            try {
                const [pR, dR] = await Promise.all([
                    fetch('https://api.binance.com/api/v3/ticker/price?symbol='+SYMBOL).then(res=>res.json()),
                    fetch('https://api.binance.com/api/v3/depth?symbol='+SYMBOL+'&limit=100').then(res=>res.json())
                ]);

                let buyVol = 0, sellVol = 0;
                let priceNow = parseFloat(pR.price);
                document.getElementById('price-val').innerText = '$' + priceNow.toLocaleString();
                document.getElementById('coin-name').innerText = SYMBOL;

                dR.bids.forEach(b => { let v = parseFloat(b[0]) * parseFloat(b[1]); if(v > 1000000) buyVol += v; });
                dR.asks.forEach(a => { let v = parseFloat(a[0]) * parseFloat(a[1]); if(v > 1000000) sellVol += v; });

                document.getElementById('b-vol').innerText = '$' + (buyVol/1000000).toFixed(2) + 'M';
                document.getElementById('s-vol').innerText = '$' + (sellVol/1000000).toFixed(2) + 'M';

                let sigBox = document.getElementById('sig-val');
                let imbalance = buyVol / (sellVol + 1);
                let absorption = (buyVol > sellVol && priceNow <= lastPrice) || (sellVol > buyVol && priceNow >= lastPrice);

                if (absorption) { sigBox.innerText = "🧲 ABSORPTION (SMART MONEY)"; sigBox.style.background = "#9333ea"; }
                else if (imbalance > 2) { sigBox.innerText = "BUY 🚀 (IMBALANCE)"; sigBox.style.background = "#22c55e"; }
                else if (imbalance < 0.5) { sigBox.innerText = "SELL 🔻 (IMBALANCE)"; sigBox.style.background = "#ef4444"; }
                else { sigBox.innerText = "NEUTRAL ⚖️"; sigBox.style.background = "#1e293b"; }

                lastPrice = priceNow;
            } catch (e) {}
        }
        setInterval(scan, 3000); scan();
    </script>
</body>
</html>
