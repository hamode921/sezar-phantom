<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC VICTUS RADAR - SEZAR</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .lock-box { border: 2px solid #fbbf24; padding: 40px; text-align: center; background: #050505; margin-top: 20vh; border-radius: 10px; }
        input { background: #111; border: 1px solid #444; color: #fbbf24; padding: 12px; text-align: center; margin-bottom: 20px; width: 250px; outline: none; border-radius: 5px; }
        button { background: #fbbf24; color: #000; border: none; padding: 12px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; }
        #radar-ui { display: none; width: 100%; max-width: 450px; }
        .header { border: 2px double #fbbf24; padding: 15px; text-align: center; margin-bottom: 20px; }
        .price-box { border: 1px dashed #555; padding: 20px; text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 20px; background: #080808; color: #00d2ff; }
        .row { display: flex; justify-content: space-between; font-size: 14px; padding: 10px 0; border-bottom: 1px solid #111; }
        .stats-text { text-align: center; font-size: 14px; margin-bottom: 5px; color: #eee; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-screen" class="lock-box">
        <h2 style="color:#fbbf24; margin-top:0;">🔐 نظام سيزر فانتوم</h2>
        <input type="password" id="pass-key" placeholder="أدخل كود التفعيل">
        <button onclick="activate()">دخول</button>
    </div>

    <div id="radar-ui">
        <div class="header"><h2>🔭 VICTUS FULL RADAR</h2><p>[ BTCUSDT ]</p></div>
        <div class="price-box" id="coin-price">$0,000.00</div>
        
        <div class="stats-text" id="buy-sell-per">BUY: 50% | SELL: 50%</div>
        <div id="power-bar" style="text-align:center; margin-bottom:20px; letter-spacing:3px;"></div>

        <div style="margin-bottom:25px;">
            <div style="color:#ef4444; border-bottom:1px solid; padding-bottom:5px; margin-bottom:10px; font-weight:bold;">🔴 MAJOR SELL WALLS (Targets):</div>
            <div id="s-walls"></div>
        </div>

        <div style="margin-bottom:25px;">
            <div style="color:#22c55e; border-bottom:1px solid; padding-bottom:5px; margin-bottom:10px; font-weight:bold;">🟢 MAJOR BUY WALLS (Supports):</div>
            <div id="b-walls"></div>
        </div>

        <div id="sig-val" style="padding:15px; text-align:center; font-weight:bold; border-radius:4px;">ANALYZING...</div>
    </div>

    <script>
        const KEYS = ["SZ_60", "SZ_15", "SZ_20", "SZ_99", "SZ_88"];
        const SYMBOL = 'BTCUSDT';

        window.onload = function() { if (localStorage.getItem('sz_activated') === 'true') showRadar(); };
        function activate() { if (KEYS.includes(document.getElementById('pass-key').value)) { localStorage.setItem('sz_activated', 'true'); showRadar(); } else { alert("خطأ!"); } }
        function showRadar() { document.getElementById('auth-screen').style.display = 'none'; document.getElementById('radar-ui').style.display = 'block'; start(); }

        async function start() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${SYMBOL}&limit=5000`);
                const data = await res.json();
                const price = parseFloat(data.bids[0][0]);
                document.getElementById('coin-price').innerText = '$' + price.toLocaleString(undefined, {minimumFractionDigits: 2});

                let bids = data.bids.map(b => ({p: parseFloat(b[0]), liq: parseFloat(b[0]) * parseFloat(b[1])}));
                let asks = data.asks.map(a => ({p: parseFloat(a[0]), liq: parseFloat(a[0]) * parseFloat(a[1])}));

                let whaleAsks = [...asks].sort((a,b) => b.liq - a.liq).slice(0, 3).sort((a,b) => a.p - b.p);
                let whaleBids = [...bids].sort((a,b) => b.liq - a.liq).slice(0, 3).sort((a,b) => b.p - a.p);

                document.getElementById('s-walls').innerHTML = whaleAsks.map(a => `
                    <div class="row">
                        <span style="color:#888;">Vol: ${(a.liq/1000000).toFixed(2)}M</span>
                        <span style="color:#ef4444;">+${(((a.p - price) / price) * 100).toFixed(2)}%</span>
                        <span>🎯 $${a.p.toLocaleString()}</span>
                    </div>`).join('');

                document.getElementById('b-walls').innerHTML = whaleBids.map(b => `
                    <div class="row">
                        <span style="color:#888;">Vol: ${(b.liq/1000000).toFixed(2)}M</span>
                        <span style="color:#22c55e;">-${(((price - b.p) / price) * 100).toFixed(2)}%</span>
                        <span>🛡️ $${b.p.toLocaleString()}</span>
                    </div>`).join('');

                let tB = bids.reduce((s,b)=>s+b.liq,0), tS = asks.reduce((s,a)=>s+a.liq,0);
                let buyP = (tB/(tB+tS)*100);
                let sellP = 100 - buyP;

                // تحديث النسب المئوية والشريط
                document.getElementById('buy-sell-per').innerText = `BUY: ${buyP.toFixed(1)}% | SELL: ${sellP.toFixed(1)}%`;
                document.getElementById('power-bar').innerText = "🟢".repeat(Math.round(buyP/6.6)) + "🔴".repeat(15-Math.round(buyP/6.6));
                
                const s = document.getElementById('sig-val');
                s.innerText = buyP > 50 ? "🟢 SIGNAL: BULLISH" : "🔴 SIGNAL: BEARISH";
                s.style.background = buyP > 50 ? "#064e3b" : "#450a0a";

            } catch (e) {}
            setTimeout(start, 5000);
        }
    </script>
</body>
</html>
