<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIVATE RADAR - SINGLE DEVICE ONLY</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .lock-box { border: 2px solid #fbbf24; padding: 40px; text-align: center; background: #050505; border-radius: 10px; }
        input { background: #111; border: 1px solid #444; color: #fbbf24; padding: 12px; text-align: center; font-size: 18px; margin-bottom: 20px; width: 250px; outline: none; }
        button { background: #fbbf24; color: #000; border: none; padding: 12px 30px; font-weight: bold; cursor: pointer; width: 100%; }
        #radar-ui { display: none; width: 100%; max-width: 450px; padding: 20px; }
        .header { border: 2px double #fbbf24; padding: 15px; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="lock-box">
        <h2 style="color:#fbbf24;">🔐 قفل البصمة الرقمية</h2>
        <p style="color:#888; font-size:11px;">هذا الكود يعمل على جهاز واحد فقط ولن يعمل على غيره نهائياً</p>
        <input type="password" id="pass-key" placeholder="أدخل كود التفعيل">
        <br>
        <button onclick="activateDevice()">تفعيل الجهاز الحالي</button>
    </div>

    <div id="radar-ui">
        <div class="header"><h2>🛰️ BTC PRIVATE RADAR</h2><p>LOCKED TO THIS DEVICE</p></div>
        <div id="btc-price" style="font-size:30px; text-align:center; color:#00d2ff; margin-bottom:20px;">$0,000.00</div>
        <div id="s-walls"></div>
        <div id="b-walls"></div>
    </div>

    <script>
        // --- الكودات الـ 5 (تغيرهم لما تبيعهم) ---
        const KEYS = ["SZ_01", "SZ_02", "SZ_03", "SZ_04", "SZ_05"];

        window.onload = function() {
            // فحص إذا كان هذا الجهاز هو "المالك" المسجل
            if (localStorage.getItem('is_activated') === 'true') {
                showRadar();
            }
        };

        function activateDevice() {
            const input = document.getElementById('pass-key').value;

            if (KEYS.includes(input)) {
                // ميزة القفل الذكي:
                // نخزن في المتصفح إن هذا الجهاز "تم تفعيله"
                localStorage.setItem('is_activated', 'true');
                localStorage.setItem('my_key', input);
                
                alert("تم ربط الرادار بهذا الجهاز بنجاح! لن يعمل على جهاز آخر.");
                showRadar();
            } else {
                alert("الكود غير صحيح أو تم استخدامه مسبقاً!");
            }
        }

        function showRadar() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            startBtcRadar();
        }

        async function startBtcRadar() {
            // كود سحب بيانات بايننس (نفسه السابق)
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const data = await res.json();
                document.getElementById('btc-price').innerText = '$' + parseFloat(data.price).toLocaleString();
            } catch(e){}
            setTimeout(startBtcRadar, 4000);
        }
    </script>
</body>
</html>
