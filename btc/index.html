<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC PRIVATE RADAR - SEZAR</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .lock-box { border: 2px solid #fbbf24; padding: 40px; text-align: center; background: #050505; border-radius: 10px; margin-top: 20vh; }
        input { background: #111; border: 1px solid #444; color: #fbbf24; padding: 12px; text-align: center; font-size: 18px; margin-bottom: 20px; width: 250px; outline: none; }
        button { background: #fbbf24; color: #000; border: none; padding: 12px 30px; font-weight: bold; cursor: pointer; width: 100%; }
        
        #radar-ui { display: none; width: 100%; max-width: 450px; }
        .header { border: 2px double #fbbf24; padding: 15px; text-align: center; margin-bottom: 20px; }
        .price-box { border: 1px dashed #555; padding: 20px; text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 20px; background: #080808; color: #00d2ff; }
        .row { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid #111; color: #ccc; }
        .signal-box { padding: 15px; text-align: center; font-weight: bold; margin-top: 15px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="lock-box">
        <h2 style="color:#fbbf24;">🔐 نظام سيزر فانتوم</h2>
        <input type="password" id="pass-key" placeholder="أدخل كود التفعيل">
        <button onclick="activate()">تفعيل الرادار</button>
    </div>

    <div id="radar-ui">
        <div class="header">
            <h2 style="color:#fbbf24; margin:0;">🛰️ BTC PRIVATE RADAR</h2>
            <p style="color:#888; font-size:11px;">LOCKED TO THIS DEVICE</p>
        </div>
        <div class="price-box" id="btc-price">$0.00</div>
        
        <div style="margin-bottom:20px;">
            <div style="color:#ef4444; border-bottom:1px solid; padding-bottom:5px; margin-bottom:10px;">🔴 MAJOR SELL WALLS (Targets):</div>
            <div id="s-walls"></div>
        </div>

        <div style="margin-bottom:20px;">
            <div style="color:#22c55e; border-bottom:1px solid; padding-bottom:5px; margin-bottom:10px;">🟢 MAJOR BUY WALLS (Supports):</div>
            <div id="b-walls"></div>
        </div>

        <div id="sig-val" class="signal-box">ANALYZING...</div>
    </div>

    <script>
        const KEYS = ["SZ_01", "SZ_02", "SZ_03", "SZ_04", "SZ_05"];

        window.onload = function() {
            if (localStorage.getItem('is_activated') === 'true') showRadar();
        };

        function activate() {
            const input = document.getElementById('pass-key').value;
            if (KEYS.includes(input)) {
                localStorage.setItem('is_activated', 'true');
                showRadar();
            } else { alert("الكود خطأ!"); }
        }

        function showRadar() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            startAnalysis();
        }

        async function startAnalysis() {
            try {
                const [pR, dR] = await Promise.all([
                    fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT').then(res=>res.json()),
                    fetch('https://api.binance.com/api/v3/depth?symbol=BTCUSDT&limit=1000').then(res=>res.json())
                ]);

                const midPrice = parseFloat(pR.price);
                document.getElementById('btc-price').innerText = '$' + midPrice.toLocaleString();

                let allBids = dR.bids.map(b => ({p: parseFloat(b[0]), liq: parseFloat(b[0]) * parseFloat(b[1])}));
                let allAsks = dR.asks.map(a => ({p: parseFloat(a[0]), liq: parseFloat(a[0]) * parseFloat(a[1])}));

                let whaleAsks = allAsks.sort((a,b) => b.liq - a.liq).slice(0, 3).sort((a,b) => a.p - b.p);
                let whaleBids = allBids.sort((a,b) => b.liq - a.liq).slice(0, 3).sort((a,b) => b.p - a.p);

                document.getElementById('s-walls').innerHTML = whaleAsks.map(a => `
                    <div class="row">
                        <span>🎯 $${a.p.toLocaleString()}</span>
                        <span style="color:#ef4444;">+${(((a.p - midPrice) / midPrice) * 100).toFixed(2)}%</span>
                        <span>${(a.liq/1000000).toFixed(2)}M</span>
                    </div>`).join('');

                document.getElementById('b-walls').innerHTML = whaleBids.map(b => `
                    <div class="row">
                        <span>🛡️ $${b.p.toLocaleString()}</span>
                        <span style="color:#22c55e;">-${(((midPrice - b.p) / midPrice) * 100).toFixed(2)}%</span>
                        <span>${(b.liq/1000000).toFixed(2)}M</span>
                    </div>`).join('');

                let totalBuy = allBids.reduce((s, b) => s + b.liq, 0);
                let totalSell = allAsks.reduce((s, a) => s + a.liq, 0);
                let buyPer = (totalBuy / (totalBuy + totalSell) * 100);
                
                const sigBox = document.getElementById('sig-val');
                sigBox.innerText = buyPer > 50 ? "SIGNAL: BULLISH 🟢" : "SIGNAL: BEARISH 🔴";
                sigBox.style.background = buyPer > 50 ? "#064e3b" : "#450a0a";

            } catch (e) { }
            setTimeout(startAnalysis, 5000);
        }
    </script>
</body>
</html>
