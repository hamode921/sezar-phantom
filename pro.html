<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار سيزار PRO - حماية الأجهزة</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .lock-box { border: 2px solid #fbbf24; padding: 30px; text-align: center; background: #050505; margin-top: 15vh; border-radius: 15px; width: 280px; box-shadow: 0 0 20px rgba(251, 191, 36, 0.1); }
        input { background: #111; border: 1px solid #444; color: #fbbf24; padding: 12px; text-align: center; margin-bottom: 20px; width: 90%; outline: none; border-radius: 5px; font-weight: bold; }
        button { background: #fbbf24; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; transition: 0.3s; }
        #radar-ui { display: none; width: 100%; max-width: 450px; }
        .header { border: 2px double #fbbf24; padding: 15px; text-align: center; margin-bottom: 20px; }
        .price-box { border: 1px dashed #555; padding: 20px; text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 5px; background: #080808; color: #00d2ff; }
        .row { display: flex; justify-content: space-between; font-size: 14px; padding: 10px 0; border-bottom: 1px solid #111; }
        .contact-dev { margin-top: 25px; border-top: 1px dashed #444; padding-top: 15px; display: flex; justify-content: space-around; gap: 10px; }
        .contact-dev a { color: #fbbf24; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="lock-box">
        <h2 style="color:#fbbf24; margin-bottom:10px;">🔐 سيزار PRO</h2>
        <p style="font-size: 10px; color: #666;">نظام حماية الأجهزة النشط</p>
        <input type="password" id="pass-key" placeholder="أدخل كود التفعيل">
        <button onclick="activate()">تفعيل لجهاز واحد</button>
        <div class="contact-dev">
            <a href="https://t.me/YOUR_USERNAME" target="_blank">✈️ تليجرام</a>
            <a href="mailto:support@mail.com">📧 الدعم</a>
        </div>
    </div>

    <div id="radar-ui">
        <div class="header"><h2>🔭 رادار سيزار PRO</h2><p>[ BTCUSDT ]</p></div>
        <div class="price-box" id="coin-price">Loading...</div>
        <div id="s-walls"></div>
        <div id="b-walls" style="margin-top:20px;"></div>
    </div>

    <script>
        const SYSTEM_VERSION = "PRO_V_SECURE_1"; 
        const KEYS = ["SZ_01", "SZ_02", "SZ_03", "SZ_04", "SZ_05"];
        
        // توليد بصمة بسيطة للجهاز تعتمد على دقة الشاشة ونوع المعالج
        const deviceFingerprint = window.screen.width + "x" + window.screen.height + navigator.hardwareConcurrency;

        window.onload = function() {
            const savedKey = localStorage.getItem('active_key');
            const savedFingerprint = localStorage.getItem('device_id');

            if (savedKey && savedFingerprint === deviceFingerprint) {
                showRadar();
            } else if (savedKey && savedFingerprint !== deviceFingerprint) {
                alert("🔴 تنبيه: هذا الكود مفعل على جهاز آخر!");
                localStorage.clear();
                location.reload();
            }
        };

        function activate() {
            const inputKey = document.getElementById('pass-key').value;
            
            if (KEYS.includes(inputKey)) {
                // تخزين الكود وبصمة الجهاز في المتصفح
                localStorage.setItem('active_key', inputKey);
                localStorage.setItem('device_id', deviceFingerprint);
                localStorage.setItem('sz_version', SYSTEM_VERSION);
                showRadar();
            } else {
                alert("الكود خطأ!");
            }
        }

        function showRadar() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            updateData();
            setInterval(updateData, 1000); // تحديث السعر كل ثانية
        }

        async function updateData() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT`);
                const data = await res.json();
                document.getElementById('coin-price').innerText = '$' + parseFloat(data.price).toLocaleString();
                // بقية فنكشن السيولة (نفس القديم)
            } catch (e) {}
        }
    </script>
</body>
</html>
