<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
        }

        .header-title {
            text-align: center;
            color: #a855f7; /* لون الموف لـ WHALE SCANNER كما بالصورة */
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        /* حاوية الأزرار العلوية */
        .top-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .nav-btn {
            flex: 1;
            background: #000;
            border: 1px solid #fbbf24;
            color: #fbbf24;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .nav-btn.active {
            background: #fbbf24;
            color: #000;
        }

        .section-label {
            color: #a855f7;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
            font-size: 16px;
        }

        /* تصميم الكرت الذهبي المطابق للصورة 100% */
        .gold-card {
            background-color: #080808;
            border: 1px solid #1a1a1a;
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* الزر الذهبي على اليمين */
        .btn-gold {
            background-color: #fbbf24;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        /* قسم البيانات على اليسار */
        .data-section {
            text-align: left; /* كما في الصورة الذهبية البيانات لليسار */
        }

        .coin-name {
            color: #fbbf24;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
            display: block;
        }

        .pre-pump {
            color: #22c55e;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .volume {
            color: #666;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div class="header-title">WHALE SCANNER</div>

    <div class="top-nav">
        <div class="nav-btn">بحث 🔍</div>
        <div class="nav-btn active">القناص (ميم) 🛰️</div>
        <div class="nav-btn">قناص القيعان 💎</div>
    </div>

    <span class="section-label">🚀 مراقب السيولة والارتداد:</span>

    <div class="gold-card">
        <div class="data-section">
            <span class="coin-name">ETHUSDT</span>
            <div class="pre-pump">PRE-PUMP: 0.149%</div>
            <div class="volume">VOLUME: 439.51M</div>
        </div>
        <button class="btn-gold">قنص 🎯</button>
    </div>

    <div class="gold-card">
        <div class="data-section">
            <span class="coin-name">DOTUSDT</span>
            <div class="pre-pump">PRE-PUMP: 2.433%</div>
            <div class="volume">VOLUME: 6.47M</div>
        </div>
        <button class="btn-gold">قنص 🎯</button>
    </div>

    <div class="gold-card">
        <div class="data-section">
            <span class="coin-name">USDCUSDT</span>
            <div class="pre-pump">PRE-PUMP: 0.001%</div>
            <div class="volume">VOLUME: 2092.58M</div>
        </div>
        <button class="btn-gold">قنص 🎯</button>
    </div>

</body>
</html>
