<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #080808; --red: #ef4444; --green: #22c55e; }
        body { background: var(--bg); color: #fff; font-family: monospace; margin: 0; padding: 10px; overflow-x: hidden; text-align: center; }
        .nav-tabs { display: flex; gap: 10px; width: 100%; max-width: 450px; margin: 20px auto; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--gold); background: #000; color: var(--gold); font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: #000; }
        #search-screen, #scanner-screen, #radar-ui { display: none; width: 100%; max-width: 450px; margin: 0 auto; }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 15px; width: 90%; border-radius: 10px; font-size: 16px; margin-bottom: 20px; text-align: center; }
        .scan-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--gold); }
        .spike { animation: blink 1s infinite; border-left-color: var(--green); }
        @keyframes blink { 0%, 100% { background: #080808; } 50% { background: #062010; } }
        .whale-live-box { background: #0a0a0a; border: 1px solid var(--gold); border-radius: 10px; margin: 15px 0; padding: 15px; }
        .whale-grid { display: flex; justify-content: space-around; }
        .whale-val { font-size: 18px; font-weight: bold; }
        .price-box { font-size: 32px; font-weight: bold; color: #00d2ff; margin: 15px 0; }
        .ai-signal-box { background: #111; border: 1px double var(--gold); border-radius: 10px; padding: 15px; margin: 15px 0; }
        .row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; font-size: 13px; }
    </style>
</head>
<body onload="checkAuth()">

<div id="search-screen">
    <h2 style="color:var(--gold)">SEZAR-PHANTOM</h2>
    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('search')">🔍 بحث</button>
        <button class="tab-btn" onclick="switchTab('scanner')">🛰️ القناص</button>
    </div>
    <input type="text" class="search-input" id="search-input" placeholder="ادخل اسم العملة..." oninput="searchCoins()">
    <div id="results-list"></div>
</div>

<div id="scanner-screen">
    <h2 style="color:var(--ghost)">WHALE SCANNER (1$-50$)</h2>
    <div id="scanner-list"></div>
</div>

<div id="radar-ui">
    <button onclick="goBack()" style="float:left; background:var(--gold); border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">🔙</button>
    <div id="current-coin-name" style="color:var(--gold); font-weight:bold; margin-bottom:10px;"></div>
    <div class="price-box" id="coin-price">$0.00</div>
    
    <div style="width:100%; height:300px; background:#000; border:1px solid #333; border-radius:10px; overflow:hidden;">
        <iframe id="chart-frame" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <div class="whale-live-box">
        <div style="font-size:12px; color:var(--gold); margin-bottom:10px;">🐳 حيتان لايف (أوامر حقيقية)</div>
        <div class="whale-grid">
            <div><div style="color:var(--red); font-size:10px;">بيع</div><div class="whale-val" id="short-whales" style="color:var(--red)">0</div></div>
            <div><div style="color:var(--gold); font-size:10px;">الحالة</div><div id="whale-ratio">ANALYZING</div></div>
            <div><div style="color:var(--green); font-size:10px;">شراء</div><div class="whale-val" id="long-whales" style="color:var(--green)">0</div></div>
        </div>
    </div>

    <div class="ai-signal-box">
        <div id="ai-decision" style="font-size:20px; font-weight:bold;">ANALYZING...</div>
        <div style="font-size:11px; color:#888;">الدقة: <span id="ai-conf">--</span></div>
    </div>
    <div id="b-walls"></div>
    <div id="s-walls"></div>
</div>

<script>
    let currentSymbol = '', allCoins = [], pInt, lInt, scanInt, lastVolMap = new Map();
    // قائمة العملات المستقرة والوهمية للحظر النهائي
    const blackList = ['USDC', 'FDUSD', 'TUSD', 'USDP', 'DAI', 'EUR', 'USD1', 'BUSD', 'GBP', 'PAXG'];

    function checkAuth() { document.getElementById('search-screen').style.display = 'block'; loadCoins(); }

    async function loadCoins() {
        const res = await fetch('https://api.binance.com/api/v3/exchangeInfo');
        const data = await res.json();
        allCoins = data.symbols.filter(s => s.symbol.endsWith('USDT') && !blackList.some(b => s.symbol.includes(b))).map(s => s.symbol);
    }

    function switchTab(tab) {
        document.getElementById('search-screen').style.display = tab === 'search' ? 'block' : 'none';
        document.getElementById('scanner-screen').style.display = tab === 'scanner' ? 'block' : 'none';
        document.getElementById('radar-ui').style.display = tab === 'radar' ? 'block' : 'none';
        if(tab === 'scanner') { updateScanner(); scanInt = setInterval(updateScanner, 5000); } else clearInterval(scanInt);
    }

    async function updateScanner() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            const data = await res.json();
            // الفلتر المطلوب: السعر بين 1 و 50 دولار + استبعاد المستقرة + سيولة عالية
            let candidates = data.filter(c => {
                const price = parseFloat(c.lastPrice);
                const vol = parseFloat(c.quoteVolume);
                return c.symbol.endsWith('USDT') && !blackList.some(b => c.symbol.includes(b)) && price >= 1.0 && price <= 50.0 && vol > 5000000;
            }).map(c => {
                const curVol = parseFloat(c.quoteVolume);
                const prevVol = lastVolMap.get(c.symbol) || curVol;
                const volInc = ((curVol - prevVol) / prevVol) * 100;
                lastVolMap.set(c.symbol, curVol);
                return { ...c, volInc };
            }).sort((a,b) => b.volInc - a.volInc).slice(0, 10);

            let html = '';
            candidates.forEach(c => {
                html += `<div class="scan-item ${c.volInc > 1.0 ? 'spike' : ''}">
                    <div style="text-align:right">
                        <div style="color:var(--gold); font-weight:bold;">${c.symbol}</div>
                        <div style="font-size:11px;">$${parseFloat(c.lastPrice).toFixed(2)} | نمو سيولة: +${c.volInc.toFixed(2)}%</div>
                    </div>
                    <button onclick="startRadar('${c.symbol}')" style="background:var(--gold); border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">تحليل</button>
                </div>`;
            });
            document.getElementById('scanner-list').innerHTML = html;
        } catch(e){}
    }

    function startRadar(symbol) {
        currentSymbol = symbol;
        switchTab('radar');
        document.getElementById('current-coin-name').innerText = symbol;
        document.getElementById('chart-frame').src = `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}&interval=1&theme=dark`;
        if(pInt) clearInterval(pInt); if(lInt) clearInterval(lInt);
        updatePrice(); updateLiquidity();
        pInt = setInterval(updatePrice, 1000);
        lInt = setInterval(updateLiquidity, 3000);
    }

    async function updatePrice() {
        const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${currentSymbol}`);
        const data = await res.json();
        document.getElementById('coin-price').innerText = '$' + parseFloat(data.price).toLocaleString();
    }

    async function updateLiquidity() {
        try {
            const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${currentSymbol}&limit=500`);
            const data = await res.json();
            const bids = data.bids.map(b => ({p: parseFloat(b[0]), v: parseFloat(b[1])}));
            const asks = data.asks.map(a => ({p: parseFloat(a[0]), v: parseFloat(a[1])}));

            // رصد الحيتان: طلبات شراء أو بيع تزيد عن 30,000 دولار
            const whaleLongs = bids.filter(b => (b.p * b.v) > 30000).length;
            const whaleShorts = asks.filter(a => (a.p * a.v) > 30000).length;

            document.getElementById('long-whales').innerText = whaleLongs;
            document.getElementById('short-whales').innerText = whaleShorts;
            
            const tB = bids.reduce((s,b)=>s+(b.p*b.v),0);
            const tS = asks.reduce((s,a)=>s+(a.p*a.v),0);
            const buyPerc = (tB/(tB+tS)*100);

            const ai = document.getElementById('ai-decision');
            if(buyPerc > 60 && whaleLongs > whaleShorts) {
                ai.innerText = "🚀 انفجار وشيك (شراء)"; ai.style.color = "var(--green)";
                document.getElementById('ai-conf').innerText = "94%";
            } else if (buyPerc < 40) {
                ai.innerText = "🔴 تصريف حيتان (بيع)"; ai.style.color = "var(--red)";
                document.getElementById('ai-conf').innerText = "91%";
            } else {
                ai.innerText = "🟡 منطقة تجميع"; ai.style.color = "var(--gold)";
                document.getElementById('ai-conf').innerText = "50%";
            }
        } catch(e){}
    }

    function searchCoins() {
        const q = document.getElementById('search-input').value.toUpperCase();
        let html = '';
        allCoins.filter(s => s.includes(q)).slice(0, 10).forEach(s => {
            html += `<div class="coin-item" onclick="startRadar('${s}')" style="padding:15px; border-bottom:1px solid #222; cursor:pointer;">${s}</div>`;
        });
        document.getElementById('results-list').innerHTML = html;
    }
    function goBack() { switchTab('search'); }
</script>
</body>
</html>
