<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #080808; --red: #ef4444; --green: #22c55e; --blue: #3b82f6; }
        
        #zoom-wrapper { width: 100vw; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #zoom-container { transition: transform 0.3s ease; transform-origin: top center; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* Auth */
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; }
        input.pass { background: #111; border: 1px solid #333; color: var(--gold); padding: 12px; text-align: center; margin-bottom: 20px; width: 95%; outline: none; border-radius: 5px; font-size: 18px; }
        button.login-btn { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 100%; font-size: 18px; }

        /* Screens */
        #search-screen, #scanner-screen, #bottom-scanner-screen { display: none; width: 100%; max-width: 450px; text-align: center; margin-top: 20px; }
        .sezar-brand .sub-text { font-size: 28px; font-weight: bold; color: var(--gold); text-shadow: 0 0 15px rgba(251, 191, 36, 0.5); }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px; width: 95%; border-radius: 15px; font-size: 16px; text-align: center; margin-bottom: 30px; }

        /* Tabs */
        .nav-tabs { display: flex; gap: 5px; width: 95%; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px 5px; border-radius: 10px; border: 1px solid var(--gold); background: #000; color: var(--gold); font-weight: bold; cursor: pointer; font-size: 11px; }
        .tab-btn.active { background: var(--gold); color: #000; }
        
        /* Unified Card Design (The Core Request) */
        .scan-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; position: relative; }
        
        /* Meme Styles */
        .meme-card { border-left: 4px solid var(--ghost); }
        .meme-card.spike { border-color: var(--green); box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); animation: blink 1s infinite; }
        .meme-btn { background: var(--gold); color: #000; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; }

        /* Bottom Styles (Matched Design) */
        .bottom-card { border-left: 4px solid var(--blue); }
        .bottom-btn { background: var(--blue); color: #fff; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; }
        
        .card-info { text-align: right; flex-grow: 1; padding-right: 15px; }
        .symbol-name { color: var(--gold); font-weight: bold; font-size: 17px; margin-bottom: 4px; }
        .data-label { font-size: 11px; font-weight: bold; }
        .data-vol { color: #666; font-size: 10px; margin-top: 2px; }

        @keyframes blink { 0% { background: #080808; } 50% { background: #062010; } 100% { background: #080808; } }
        
        /* Radar UI & Components */
        #radar-ui { display: none; width: 100%; max-width: 450px; padding-bottom: 80px; }
        .price-box { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 32px; font-weight: 900; margin-bottom: 10px; background: #0a0a0a; color: #00d2ff; }
        #chart-container { width: 100%; height: 350px; border: 1px solid #222; border-radius: 10px; position: relative; }
        #chart-frame { width: 100%; height: 100%; border: none; }

        .contact-dev { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); padding: 15px 0; display: flex; justify-content: space-around; border-top: 1px solid #222; z-index: 100; }
        .contact-dev a { color: var(--gold); text-decoration: none; font-size: 11px; border: 1px solid var(--gold); padding: 8px 16px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body onload="checkAuth()">

<div id="zoom-wrapper">
    <div id="zoom-container">
        <div id="auth-screen" class="lock-box">
            <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 تفعيل SEZAR-PHANTOM PRO</div>
            <input type="password" id="pass-key" class="pass" placeholder="•••••">
            <button onclick="activate()" class="login-btn">تسجيل دخول</button>
        </div>

        <div id="search-screen">
            <div class="sezar-brand"><span class="sub-text">「 SEZAR-PHANTOM 」</span></div>
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('search')">🔍 بحث</button>
                <button class="tab-btn" onclick="switchTab('scanner')">🛰️ القناص (ميم)</button>
                <button class="tab-btn" onclick="switchTab('bottom')">💎 قناص القيعان</button>
            </div>
            <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث..." oninput="searchCoins()">
            <div id="results-list"></div>
        </div>

        <div id="scanner-screen">
            <div class="sezar-brand"><span class="sub-text" style="color:var(--ghost);">WHALE SCANNER</span></div>
            <div class="nav-tabs">
                <button class="tab-btn" onclick="switchTab('search')">🔍 بحث</button>
                <button class="tab-btn active" onclick="switchTab('scanner')">🛰️ القناص (ميم)</button>
                <button class="tab-btn" onclick="switchTab('bottom')">💎 قناص القيعان</button>
            </div>
            <div style="color:var(--ghost); font-weight:bold; margin-bottom:15px; text-align:right;">🚀 مراقب السيولة والارتداد:</div>
            <div id="scanner-list"></div>
        </div>

        <div id="bottom-scanner-screen">
            <div class="sezar-brand"><span class="sub-text" style="color:var(--blue);">BOTTOM SCANNER</span></div>
            <div class="nav-tabs">
                <button class="tab-btn" onclick="switchTab('search')">🔍 بحث</button>
                <button class="tab-btn" onclick="switchTab('scanner')">🛰️ القناص (ميم)</button>
                <button class="tab-btn active" onclick="switchTab('bottom')">💎 قناص القيعان</button>
            </div>
            <div style="color:var(--blue); font-weight:bold; margin-bottom:15px; text-align:right;">🐳 تجميع الحيتان في القاع:</div>
            <div id="bottom-scanner-list"></div>
        </div>

        <div id="radar-ui">
            <div style="border: 1px solid var(--gold); padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; position: relative;">
                <button onclick="goBack()" style="position: absolute; left: 10px; top: 10px; background: var(--gold); border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer;">🔙</button>
                <span id="current-coin-name" style="font-weight: bold;">[ BTCUSDT ]</span>
            </div>
            <div class="price-box" id="coin-price">Loading...</div>
            <div id="chart-container"><iframe id="chart-frame" src=""></iframe></div>
            <div id="sig-box" style="text-align: center; font-weight: bold; padding: 15px; margin-top: 20px; border-radius: 10px;">ANALYZING...</div>
        </div>
    </div>
</div>

<div class="contact-dev"><a href="https://t.me/se44se" target="_blank">✈️ تليجرام</a><a href="mailto:sezarphantom@gmail.com">📧 الإيميل</a></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY", authDomain: "sezar-phantom-auth.firebaseapp.com", projectId: "sezar-phantom-auth", storageBucket: "sezar-phantom-auth.firebasestorage.app", messagingSenderId: "112991314655", appId: "1:112991314655:web:cbca0b5c0c6b6e4f51ff6a" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allCoins = [], scanInt, lastVolMap = new Map();

    function switchTab(tab) {
        document.getElementById('search-screen').style.display = tab === 'search' ? 'block' : 'none';
        document.getElementById('scanner-screen').style.display = tab === 'scanner' ? 'block' : 'none';
        document.getElementById('bottom-scanner-screen').style.display = tab === 'bottom' ? 'block' : 'none';
        document.getElementById('radar-ui').style.display = tab === 'radar' ? 'block' : 'none';
        if(tab === 'scanner' || tab === 'bottom') { updateScanner(); updateBottomScanner(); if(!scanInt) scanInt = setInterval(() => { updateScanner(); updateBottomScanner(); }, 5000); }
        else { clearInterval(scanInt); scanInt = null; }
    }

    async function checkAuth() {
        const savedKey = localStorage.getItem('sz_ultimate_v1_key');
        if (savedKey) showSearch(); else document.getElementById('auth-screen').style.display = 'block';
    }

    async function activate() {
        const k = document.getElementById('pass-key').value;
        if(k) { localStorage.setItem('sz_ultimate_v1_key', k); showSearch(); }
    }

    async function showSearch() {
        document.getElementById('auth-screen').style.display = 'none';
        switchTab('search');
        const res = await fetch('https://api.binance.com/api/v3/exchangeInfo');
        const data = await res.json();
        allCoins = data.symbols.filter(s => s.status === 'TRADING' && s.symbol.endsWith('USDT')).map(s => ({s: s.symbol, m: 'spot'}));
    }

    function searchCoins() {
        const query = document.getElementById('search-input').value.toUpperCase();
        const list = document.getElementById('results-list');
        list.innerHTML = '';
        allCoins.filter(c => c.s.includes(query)).slice(0, 10).forEach(c => {
            const item = document.createElement('div');
            item.className = 'scan-item';
            item.style.cursor = 'pointer';
            item.innerHTML = `<div class="symbol-name">${c.s}</div><div style="color:var(--gold)">تحليل 📡</div>`;
            item.onclick = () => startRadar(c.s);
            list.appendChild(item);
        });
    }

    // تصميم قناص القيعان المعدل (نفس تصميم الميم)
    async function updateBottomScanner() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            const data = await res.json();
            const list = document.getElementById('bottom-scanner-list');
            let bottomCoins = data.filter(c => {
                const low = parseFloat(c.lowPrice), current = parseFloat(c.lastPrice), vol = parseFloat(c.quoteVolume);
                return c.symbol.endsWith('USDT') && ((current - low) / low) * 100 < 1.0 && vol > 2000000;
            }).slice(0, 8);

            let html = '';
            bottomCoins.forEach(c => {
                html += `
                    <div class="scan-item bottom-card">
                        <button class="bottom-btn" onclick="startRadar('${c.symbol}')">متابعة 🎯</button>
                        <div class="card-info">
                            <div class="symbol-name">${c.symbol}</div>
                            <div class="data-label" style="color:var(--blue)">تجميع حيتان 🐳</div>
                            <div class="data-vol">الهدف المتوقع: <span style="color:var(--green)">+15% 📈</span></div>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
        } catch(e) {}
    }

    // تصميم قناص الميم الأصلي
    async function updateScanner() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            const data = await res.json();
            const list = document.getElementById('scanner-list');
            let candidates = data.filter(c => {
                const change = parseFloat(c.priceChangePercent), vol = parseFloat(c.quoteVolume);
                return c.symbol.endsWith('USDT') && change >= 0 && change <= 15 && vol > 5000000;
            }).map(c => {
                const currentVol = parseFloat(c.quoteVolume), prevVol = lastVolMap.get(c.symbol) || currentVol;
                const volIncrease = prevVol > 0 ? ((currentVol - prevVol) / prevVol) * 100 : 0;
                lastVolMap.set(c.symbol, currentVol);
                return { ...c, volIncrease };
            }).sort((a,b) => b.volIncrease - a.volIncrease).slice(0, 10);

            let html = '';
            candidates.forEach(c => {
                const isSpike = c.volIncrease > 0.8;
                html += `
                    <div class="scan-item meme-card ${isSpike ? 'spike' : ''}">
                        <button class="meme-btn" onclick="startRadar('${c.symbol}')">قنص 🎯</button>
                        <div class="card-info">
                            <div class="symbol-name">${c.symbol}</div>
                            <div class="data-label" style="color:var(--green)">PRE-PUMP: ${parseFloat(c.priceChangePercent).toFixed(2)}%</div>
                            <div class="data-vol">VOLUME: ${(parseFloat(c.quoteVolume)/1000000).toFixed(2)}M</div>
                        </div>
                    </div>`;
            });
            list.innerHTML = html;
        } catch(e) {}
    }

    function startRadar(symbol) {
        switchTab('radar');
        document.getElementById('current-coin-name').innerText = `[ ${symbol} ]`;
        document.getElementById('chart-frame').src = `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}&interval=1&theme=dark`;
        setInterval(async () => {
            const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
            const data = await res.json();
            document.getElementById('coin-price').innerText = '$' + parseFloat(data.price).toLocaleString();
        }, 2000);
    }

    function goBack() { switchTab('search'); }
</script>
</body>
</html>
