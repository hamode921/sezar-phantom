<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رادار سيزار PRO</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .lock-box { border: 2px solid #fbbf24; padding: 30px; text-align: center; background: #050505; margin-top: 15vh; border-radius: 15px; width: 280px; box-shadow: 0 0 20px rgba(251, 191, 36, 0.1); }
        .secure-title { color: #fbbf24; font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .secure-warn { color: #888; font-size: 11px; margin-bottom: 25px; line-height: 1.5; }
        input { background: #111; border: 1px solid #444; color: #fbbf24; padding: 12px; text-align: center; margin-bottom: 20px; width: 90%; outline: none; border-radius: 5px; font-weight: bold; }
        button { background: #fbbf24; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; transition: 0.3s; }
        #radar-ui { display: none; width: 100%; max-width: 450px; }
        .header { border: 2px double #fbbf24; padding: 15px; text-align: center; margin-bottom: 20px; }
        .price-box { border: 1px dashed #555; padding: 20px; text-align: center; font-size: 28px; font-weight: bold; margin-bottom: 5px; background: #080808; color: #00d2ff; }
        
        /* الترتيب اللي تحبه: حجم - نسبة - سعر */
        .row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 12px 5px; border-bottom: 1px solid #111; }
        .perc-tag { color: #fbbf24; font-weight: bold; font-size: 11px; background: rgba(251, 191, 36, 0.1); padding: 2px 8px; border-radius: 10px; border: 0.5px solid rgba(251, 191, 36, 0.3); }
        
        .contact-dev { margin-top: 30px; border-top: 1px dashed #444; padding-top: 20px; display: flex; justify-content: space-around; width: 100%; }
        .contact-dev a { color: #fbbf24; text-decoration: none; font-size: 11px; border: 1px solid #fbbf24; padding: 6px 12px; border-radius: 5px; font-weight: bold; }
        #timer-box { font-size: 10px; color: #444; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-screen" class="lock-box">
        <div class="secure-title">🔒 قفـل البصمة الرقمية</div>
        <div class="secure-warn">هذا الكود يعمل على جهاز واحد فقط<br>ولن يعمل على غيره نهائياً</div>
        <input type="password" id="pass-key" placeholder="أدخل كود التفعيل">
        <button onclick="activate()">تفعيل لجهاز واحد فقط</button>
    </div>

    <div id="radar-ui">
        <div class="header"><h2>🔭 رادار سيزار PRO</h2><p>[ BTCUSDT ]</p></div>
        <div class="price-box" id="coin-price">Loading...</div>
        <div id="timer-box">تحديث السيولة خلال: <span id="seconds">30</span> ثانية</div>
        <div style="text-align:center; font-size:14px; margin-bottom:5px; font-weight:bold;" id="buy-sell-per">BUY: --% | SELL: --%</div>
        <div id="power-bar" style="text-align:center; margin-bottom:20px; letter-spacing:3px;"></div>
        
        <div id="s-walls"></div>
        <div id="b-walls" style="margin-top:20px;"></div>
        
        <div class="contact-dev">
            <a href="https://t.me/se44se" target="_blank">✈️ تليجرام</a>
            <a href="mailto:sezarphantom@gmail.com">📧 الإيميل</a>
        </div>
    </div>

    <script>
        const SYSTEM_VERSION = "PRO_V_FINAL_STABLE_V14"; 
        const KEYS = ["SZ_01", "SZ_02", "SZ_03", "SZ_04", "SZ_05"];
        const SYMBOL = 'BTCUSDT';
        let timeLeft = 30;

        window.onload = function() {
            if (localStorage.getItem('sz_pro_activated') === 'true' && localStorage.getItem('sz_pro_version') === SYSTEM_VERSION) {
                showRadar();
            } else {
                localStorage.clear();
                document.getElementById('auth-screen').style.display = 'block';
            }
        };

        function activate() {
            if (KEYS.includes(document.getElementById('pass-key').value)) {
                localStorage.setItem('sz_pro_activated', 'true');
                localStorage.setItem('sz_pro_version', SYSTEM_VERSION);
                showRadar();
            } else { alert("الكود خطأ!"); }
        }

        function showRadar() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('radar-ui').style.display = 'block';
            updatePriceOnly();
            updateLiquidity();
            setInterval(updatePriceOnly, 1000);
            setInterval(updateLiquidity, 30000);
            setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            timeLeft--;
            if (timeLeft < 0) timeLeft = 30;
            document.getElementById('seconds').innerText = timeLeft;
        }

        async function updatePriceOnly() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${SYMBOL}`);
                const data = await res.json();
                document.getElementById('coin-price').innerText = '$' + parseFloat(data.price).toLocaleString(undefined, {minimumFractionDigits: 2});
            } catch (e) {}
        }

        async function updateLiquidity() {
            timeLeft = 30;
            try {
                const res = await fetch(`https://api.binance.com/api/v3/depth?symbol=${SYMBOL}&limit=5000`);
                const data = await res.json();
                let bids = data.bids.map(b => ({p: parseFloat(b[0]), liq: parseFloat(b[0]) * parseFloat(b[1])}));
                let asks = data.asks.map(a => ({p: parseFloat(a[0]), liq: parseFloat(a[0]) * parseFloat(a[1])}));
                
                let tB = bids.reduce((s,b)=>s+b.liq,0), tS = asks.reduce((s,a)=>s+a.liq,0);

                let whaleAsks = [...asks].sort((a,b) => b.liq - a.liq).slice(0, 3).sort((a,b) => a.p - b.p);
                let whaleBids = [...bids].sort((a,b) => b.liq - a.liq).slice(0, 3).sort((a,b) => b.p - a.p);

                // SELL WALLS
                document.getElementById('s-walls').innerHTML = `<div style="color:#ef4444; font-weight:bold; border-bottom: 1px solid #333; padding-bottom:5px; text-align:right;">🔴 SELL WALLS (30s):</div>` + 
                whaleAsks.map(a => `<div class="row">
                    <span>Vol: ${(a.liq/1000000).toFixed(2)}M</span>
                    <span class="perc-tag">${((a.liq / tS) * 100).toFixed(2)}%</span>
                    <span>$${a.p.toLocaleString()} 🎯</span>
                </div>`).join('');

                // BUY WALLS
                document.getElementById('b-walls').innerHTML = `<div style="color:#22c55e; font-weight:bold; border-bottom: 1px solid #333; padding-bottom:5px; text-align:right;">🟢 BUY WALLS (30s):</div>` + 
                whaleBids.map(b => `<div class="row">
                    <span>Vol: ${(b.liq/1000000).toFixed(2)}M</span>
                    <span class="perc-tag">${((b.liq / tB) * 100).toFixed(2)}%</span>
                    <span>$${b.p.toLocaleString()} 🛡️</span>
                </div>`).join('');

                let buyP = (tB/(tB+tS)*100);
                document.getElementById('buy-sell-per').innerText = `BUY: ${buyP.toFixed(1)}% | SELL: ${(100-buyP).toFixed(1)}%`;
                document.getElementById('power-bar').innerText = "🟢".repeat(Math.round(buyP/6.6)) + "🔴".repeat(15-Math.round(buyP/6.6));
            } catch (e) {}
        }
    </script>
</body>
</html>
