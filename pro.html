<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SEZAR-PHANTOM PRO ULTIMATE</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --gold: #fbbf24; --ghost: #a855f7; --bg: #000; --card: #080808; --red: #ef4444; --green: #22c55e; }
        
        #zoom-wrapper { width: 100vw; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        #zoom-container { transition: transform 0.3s ease; transform-origin: top center; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .inline-btn { background: rgba(251, 191, 36, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 2px 6px; border-radius: 4px; font-size: 10px; cursor: pointer; vertical-align: middle; margin: 0 5px; }

        body { background: var(--bg); color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* واجهة القفل والبحث */
        .lock-box { border: 2px solid var(--gold); padding: 30px; text-align: center; background: #000; margin-top: 15vh; border-radius: 15px; width: 300px; }
        .search-input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 18px; width: 95%; border-radius: 15px; font-size: 16px; outline: none; text-align: center; margin-bottom: 20px; }
        
        /* أزرار التنقل الرئيسية */
        .nav-tabs { display: flex; gap: 10px; width: 95%; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--gold); background: none; color: var(--gold); font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--gold); color: #000; }

        /* ستايل القناص (Scanner) */
        .scan-item { background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 15px; margin-bottom: 12px; position: relative; border-left: 4px solid var(--ghost); }
        .scan-glow { box-shadow: 0 0 15px rgba(168, 85, 247, 0.2); border-color: var(--ghost); }
        .vol-spike { color: var(--green); font-weight: bold; font-size: 12px; }

        /* باقي الستايلات الأصلية */
        #radar-ui, #search-screen, #scanner-screen { display: none; width: 100%; max-width: 450px; }
        .coin-item { background: #080808; border: 1px solid #222; padding: 15px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .price-box { border: 1px dashed #555; padding: 15px; text-align: center; font-size: 32px; font-weight: 900; margin-bottom: 5px; background: #0a0a0a; color: #00d2ff; }
        .ice-card { background: var(--card); border: 1px solid var(--ghost); padding: 15px; border-radius: 12px; margin-top: 20px; width: 100%; box-sizing: border-box; }
        .row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #111; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body onload="checkAuth()">

<div id="zoom-wrapper">
    <div id="zoom-container">
        <div id="auth-screen" class="lock-box">
            <div style="color:var(--gold); font-weight:bold; margin-bottom:20px;">🔒 تفعيل SEZAR-PHANTOM PRO</div>
            <input type="password" id="pass-key" style="background:#111; border:1px solid #333; color:var(--gold); padding:12px; width:90%;" placeholder="•••••">
            <button onclick="activate()" style="background:var(--gold); margin-top:10px; padding:15px; width:100%; font-weight:bold;">دخول</button>
            <div id="error-msg" style="color:var(--red); display:none; margin-top:10px;"></div>
        </div>

        <div id="search-screen">
            <div style="text-align:center; margin-bottom:20px;"><span style="font-size:24px; color:var(--gold); font-weight:bold;">「 SEZAR-PHANTOM 」</span></div>
            
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('search')">🔍 بحث</button>
                <button class="tab-btn" onclick="switchTab('scanner')">🛰️ القناص (ميم)</button>
            </div>

            <div id="search-area">
                <input type="text" class="search-input" id="search-input" placeholder="🔍 ابحث عن عملة..." oninput="searchCoins()">
                <div id="results-list"></div>
            </div>
        </div>

        <div id="scanner-screen">
            <div style="text-align:center; margin-bottom:20px;"><span style="font-size:20px; color:var(--ghost); font-weight:bold;">🛰️ WHALE SCANNER (Meme Focus)</span></div>
            <div class="nav-tabs">
                <button class="tab-btn" onclick="switchTab('search')">🔍 بحث</button>
                <button class="tab-btn active" onclick="switchTab('scanner')">🛰️ القناص (ميم)</button>
            </div>
            <div id="scanner-list">
                <div style="text-align:center; color:#555; padding:20px;">جاري فحص السيولة وانفجارات الفوليوم...</div>
            </div>
        </div>

        <div id="radar-ui">
            <div style="border:1px solid var(--gold); padding:10px; text-align:center; margin-bottom:10px; position:relative;">
                <button onclick="switchTab('search')" style="position:absolute; left:10px; background:var(--gold); border:none; padding:5px; font-size:10px;">🔙</button>
                <h2 id="radar-title" style="margin:0; font-size:16px; color:var(--gold);">「 SEZAR-PHANTOM 」</h2>
                <p id="current-coin-name" style="margin:0; font-size:11px;">[ BTCUSDT ]</p>
            </div>
            <div class="price-box" id="coin-price">Loading...</div>
            <div id="chart-container" style="height:300px; background:#000; margin-bottom:10px;">
                <iframe id="chart-frame" style="width:100%; height:100%; border:none;"></iframe>
            </div>
            <div id="buy-sell-per" style="text-align:center; font-weight:bold;">BUY: --% | SELL: --%</div>
            <div id="power-bar" style="display:flex; justify-content:center; gap:5px; margin:10px 0;"></div>
            <div id="s-walls"></div>
            <div id="b-walls" style="margin-top:10px;"></div>
            <div class="ice-card">
                <div style="font-size:11px; color:var(--ghost); display:flex; justify-content:space-between; font-weight:bold;">
                    <span>ICEBERG DETECTOR</span>
                    <span id="ice-threshold-display">50K</span>
                </div>
                <input type="range" id="ice-sensitivity" min="1000" max="100000" step="1000" value="50000" style="width:100%; accent-color:var(--ghost);" oninput="document.getElementById('ice-threshold-display').innerText = (this.value/1000).toFixed(0) + 'K'">
                <div id="iceberg-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // إعدادات الفايربيس (كما هي في كودك)
    const firebaseConfig = { apiKey: "AIzaSyAzEZksgZMPbY79K_TM3mHKeW1shQ6V-lY", projectId: "sezar-phantom-auth" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentSymbol = 'BTCUSDT', currentMode = 'spot', allCoins = [], lastBids = [], lastAsks = [];
    let pInt, lInt, iInt, scanInt;

    // دالة التنقل بين الصفحات
    function switchTab(tab) {
        document.getElementById('search-screen').style.display = tab === 'search' ? 'block' : 'none';
        document.getElementById('scanner-screen').style.display = tab === 'scanner' ? 'block' : 'none';
        document.getElementById('radar-ui').style.display = tab === 'radar' ? 'block' : 'none';
        if(tab === 'scanner') { updateScanner(); if(!scanInt) scanInt = setInterval(updateScanner, 10000); }
        else { clearInterval(scanInt); scanInt = null; }
    }

    async function checkAuth() {
        if (localStorage.getItem('sz_ultimate_v1_key')) { showSearch(); }
    }

    function showSearch() {
        document.getElementById('auth-screen').style.display = 'none';
        switchTab('search');
        loadAllCoins();
    }

    async function loadAllCoins() {
        const res = await fetch('https://api.binance.com/api/v3/exchangeInfo');
        const data = await res.json();
        allCoins = data.symbols.filter(s => s.symbol.endsWith('USDT')).map(s => ({s: s.symbol, m: 'spot'}));
        searchCoins();
    }

    function searchCoins() {
        const query = document.getElementById('search-input').value.toUpperCase();
        const list = document.getElementById('results-list');
        list.innerHTML = '';
        allCoins.filter(c => c.s.includes(query)).slice(0, 10).forEach(c => {
            const item = document.createElement('div');
            item.className = 'coin-item';
            item.innerHTML = `<span>${c.s}</span><span style="color:var(--gold)">تحليل 🔭</span>`;
            item.onclick = () => startRadar(c.s, 'spot');
            list.appendChild(item);
        });
    }

    // --- منطق القناص الجديد (Whale Scanner) ---
    async function updateScanner() {
        try {
            // جلب أعلى 20 عملة من حيث الحجم والتغير
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            const data = await res.json();
            
            // فلترة عملات الميم والعملات النشطة (فوليوم عالي بالنسبة لماركت كاب صغير)
            let hotspots = data.filter(c => c.symbol.endsWith('USDT'))
                               .sort((a, b) => b.priceChangePercent - a.priceChangePercent)
                               .slice(0, 10);

            const list = document.getElementById('scanner-list');
            list.innerHTML = '';

            hotspots.forEach(c => {
                const item = document.createElement('div');
                item.className = `scan-item ${parseFloat(c.priceChangePercent) > 10 ? 'scan-glow' : ''}`;
                item.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div style="font-weight:bold; font-size:16px; color:var(--gold);">${c.symbol}</div>
                            <div class="vol-spike">CHANGE: ${c.priceChangePercent}%</div>
                        </div>
                        <div style="text-align:left;">
                            <div style="font-size:10px; color:#888;">VOL: ${(parseFloat(c.quoteVolume)/1000000).toFixed(2)}M</div>
                            <button onclick="startRadar('${c.symbol}', 'spot')" style="background:var(--ghost); border:none; color:#fff; padding:5px 10px; border-radius:5px; margin-top:5px; cursor:pointer;">قنص 🎯</button>
                        </div>
                    </div>
                `;
                list.appendChild(item);
            });
        } catch (e) {}
    }

    function startRadar(symbol, mode) {
        currentSymbol = symbol;
        switchTab('radar');
        document.getElementById('current-coin-name').innerText = `[ ${symbol} ]`;
        document.getElementById('chart-frame').src = `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}&interval=1&theme=dark`;
        // تشغيل دوال الرادار الأصلية مالتك هنا...
    }

    // إضافة باقي دوال الرادار (updatePrice, updateLiquidity, updateIceberg) من كودك القديم
</script>
</body>
</html>
